<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Sistema de Orçamentos</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-wrap">
  <div class="login-box">
    <div class="brand">
      <div class="brand-icon">📋</div>
      <div class="brand-name">Sistema de Orçamentos</div>
      <div class="brand-sub">Entre com suas credenciais</div>
    </div>
    <form onsubmit="event.preventDefault();login()" method="post" autocomplete="on">
      <div class="field">
        <label>Usuário</label>
        <input type="text" id="l-user" name="username" placeholder="Digite seu usuário" autocomplete="username">
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="l-pass" name="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button type="submit" class="login-btn" id="login-btn">Entrar</button>
    </form>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script>
  // Se já tem sessão, vai direto para o app
  if (localStorage.getItem('token') && localStorage.getItem('currentUser')) {
    location.href = 'app.html';
  }

  async function login() {
    const username = document.getElementById('l-user').value.trim();
    const password = document.getElementById('l-pass').value;
    const btn = document.getElementById('login-btn');
    const err = document.getElementById('login-err');
    err.textContent = '';

    if (!username || !password) {
      err.textContent = 'Preencha usuário e senha.';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Entrando…';

    try {
      const data = await API.post('/auth/login', { username, password });
      localStorage.setItem('token', data.token);
      localStorage.setItem('currentUser', JSON.stringify(data.user));
      location.href = 'app.html';
    } catch (e) {
      err.textContent = e.message || 'Erro ao conectar ao servidor.';
      btn.disabled = false;
      btn.textContent = 'Entrar';
    }
  }
</script>
</body>
</html>
