<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Look Orçamentos</title>
<link rel="stylesheet" href="style.css">
<style>
body {
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  background: linear-gradient(135deg, #001433 0%, #003399 50%, #0055cc 100%);
}
.login-wrap { width:380px; max-width:95vw; }
.login-box {
  background:#fff; border-radius:16px; padding:40px 36px;
  box-shadow:0 24px 64px rgba(0,0,60,.45);
}
.brand { text-align:center; margin-bottom:32px; }
.brand img { height:52px; margin-bottom:10px; }
.brand-sub { font-size:12px; color:#6c757d; }
.field { margin-bottom:14px; }
.field label { display:block; font-size:11px; color:#6c757d; font-weight:700; letter-spacing:.06em; text-transform:uppercase; margin-bottom:5px; }
.field input {
  width:100%; padding:11px 14px; border:1.5px solid #d0d8f0; border-radius:8px;
  font-size:14px; font-family:inherit; outline:none; transition:border-color .15s; background:#f4f7ff; color:#1a1a2e;
}
.field input:focus { border-color:#003399; background:#fff; }
.login-btn {
  width:100%; padding:13px; margin-top:8px; background:#003399; border:none; border-radius:8px;
  color:#fff; font-size:15px; font-weight:700; cursor:pointer; transition:background .15s; font-family:inherit;
}
.login-btn:hover { background:#0044bb; }
.login-btn:disabled { opacity:.6; cursor:not-allowed; }
.login-err { color:#dc3545; font-size:12px; text-align:center; margin-top:10px; min-height:18px; }
.login-footer { text-align:center; margin-top:16px; font-size:11px; color:rgba(255,255,255,.6); }
</style>
</head>

    <form onsubmit="event.preventDefault();login()" method="post" autocomplete="on">
      <div class="field">
        <label>Usuário</label>
        <input type="text" id="l-user" name="username" placeholder="Digite seu usuário" autocomplete="username">
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="l-pass" name="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button type="submit" class="login-btn" id="login-btn">Entrar</button>
    </form>

  </div>
  <div class="login-footer">© Look — Imprimindo Ideias</div>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script>
  // Limpa sessão velha da versão anterior (que causava o loop)
  if (localStorage.getItem('token')) {
    localStorage.removeItem('token');
    localStorage.removeItem('currentUser');
  }
  // Se já tem sessão válida (com id), vai direto — valida o id para evitar loop
  try {
    const _u = JSON.parse(localStorage.getItem('orcUser') || '{}');
    if (localStorage.getItem('orcToken') && _u && _u.id) {
      location.replace('app.html');
    }
  } catch { /* sessão corrompida, fica no login */ }

  async function login() {
    const username = document.getElementById('l-user').value.trim();
    const password = document.getElementById('l-pass').value;
    const btn = document.getElementById('login-btn');
    const err = document.getElementById('login-err');
    err.textContent = '';

    if (!username || !password) { err.textContent = 'Preencha usuário e senha.'; return; }

    btn.disabled = true; btn.textContent = 'Entrando…';
    try {
      const data = await API.post('/auth/login', { username, password });
      localStorage.setItem('orcToken', data.token);
      localStorage.setItem('orcUser',  JSON.stringify(data.user));
      location.replace('app.html');
    } catch (e) {
      err.textContent = e.message || 'Erro ao conectar ao servidor.';
      btn.disabled = false; btn.textContent = 'Entrar';
    }
  }
</script>
</body>
</html>
