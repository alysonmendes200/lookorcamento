<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aprovação de Arte — Look</title>
<link rel="icon" href="assets/look.svg" type="image/svg+xml">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f4f7ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.box { background: #fff; border-radius: 16px; padding: 36px 32px; box-shadow: 0 8px 40px rgba(0,0,60,.12); max-width: 520px; width: 100%; }
.brand { text-align: center; margin-bottom: 24px; }
.brand img { height: 40px; filter: brightness(0) saturate(100%) invert(14%) sepia(98%) saturate(2000%) hue-rotate(213deg) brightness(92%) contrast(108%); }
.brand-sub { font-size: 11px; color: #6c757d; margin-top: 6px; }
.ped-num { display: inline-block; background: #003399; color: #fff; border-radius: 8px; padding: 4px 12px; font-size: 15px; font-weight: 700; font-family: monospace; letter-spacing: .06em; margin-bottom: 8px; }
h2 { font-size: 20px; color: #1a1a2e; margin-bottom: 4px; }
.sub { font-size: 13px; color: #6c757d; margin-bottom: 20px; }
.info { background: #f4f7ff; border-radius: 10px; padding: 14px 16px; margin-bottom: 20px; font-size: 13px; line-height: 1.8; color: #333; }
.info strong { color: #1a1a2e; }
.mockup-wrap { width: 100%; border-radius: 10px; overflow: hidden; margin-bottom: 20px; background: #f9faff; border: 2px dashed #d0d8f0; }
.mockup-wrap img { width: 100%; display: block; max-height: 360px; object-fit: contain; }
.mockup-placeholder { min-height: 160px; display: flex; align-items: center; justify-content: center; color: #6c757d; font-size: 13px; text-align: center; padding: 24px; flex-direction: column; gap: 8px; }
.btns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.btn-ok  { padding: 16px; background: #198754; border: none; border-radius: 10px; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; transition: background .15s; }
.btn-ok:hover:not(:disabled) { background: #157347; }
.btn-alt { padding: 16px; background: #dc3545; border: none; border-radius: 10px; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; transition: background .15s; }
.btn-alt:hover:not(:disabled) { background: #bb2d3b; }
button:disabled { opacity: .55; cursor: not-allowed; }
.reject-box { display: none; margin-top: 14px; }
.reject-box label { font-size: 13px; font-weight: 600; color: #721c24; display: block; margin-bottom: 6px; }
.reject-box textarea { width: 100%; padding: 10px 12px; border: 1.5px solid #f5c6cb; border-radius: 8px; font-size: 13px; font-family: inherit; resize: vertical; min-height: 80px; background: #fff8f8; }
.reject-box textarea:focus { outline: none; border-color: #dc3545; }
.reject-send { width: 100%; margin-top: 8px; padding: 12px; background: #dc3545; border: none; border-radius: 8px; color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; transition: background .15s; }
.reject-send:hover { background: #bb2d3b; }
.msg { text-align: center; padding: 20px; font-size: 15px; font-weight: 600; border-radius: 10px; margin-top: 16px; display: none; line-height: 1.5; }
.loading { text-align: center; color: #6c757d; padding: 40px 0; }
</style>
</head>
<body>
<div class="box">
  <div class="brand">
    <img src="assets/look.svg" alt="Look Imprimindo Ideias">
    <div class="brand-sub">Look — Imprimindo Ideias</div>
  </div>
  <div id="conteudo" class="loading">Carregando pedido…</div>
</div>

<script src="js/config.js"></script>
<script>
const API_BASE = CONFIG.API_BASE + '/api';

// Converte links de nuvem em HTML renderizável
function resolverMockup(url) {
  if (!url) return '';
  const u = url.trim();

  // Google Drive: /file/d/FILE_ID/view → thumbnail direto
  const driveMatch = u.match(/drive\.google\.com\/file\/d\/([^/?]+)/);
  if (driveMatch) {
    const fileId = driveMatch[1];
    const thumb = `https://drive.google.com/thumbnail?id=${fileId}&sz=w800`;
    return `<div class="mockup-wrap">
      <img src="${esc(thumb)}" alt="Arte" onerror="this.parentElement.innerHTML=linkFallback('${esc(u)}')">
    </div>`;
  }

  // Google Drive: open?id=FILE_ID
  const driveOpen = u.match(/drive\.google\.com\/open\?id=([^&]+)/);
  if (driveOpen) {
    const fileId = driveOpen[1];
    const thumb = `https://drive.google.com/thumbnail?id=${fileId}&sz=w800`;
    return `<div class="mockup-wrap">
      <img src="${esc(thumb)}" alt="Arte" onerror="this.parentElement.innerHTML=linkFallback('${esc(u)}')">
    </div>`;
  }

  // URL de imagem direta (jpg, png, gif, webp, svg)
  if (/\.(jpe?g|png|gif|webp|svg)(\?|$)/i.test(u)) {
    return `<div class="mockup-wrap">
      <img src="${esc(u)}" alt="Arte" onerror="this.parentElement.innerHTML=linkFallback('${esc(u)}')">
    </div>`;
  }

  // Canva, Dropbox, outros — exibe botão de abertura
  return linkFallback(u);
}

function linkFallback(url) {
  return `<div class="mockup-wrap"><div class="mockup-placeholder">
    🖼️ <span style="font-weight:600">Arte disponível no link abaixo</span>
    <a href="${esc(url)}" target="_blank" rel="noopener"
       style="display:inline-block;margin-top:8px;padding:10px 20px;background:#003399;color:#fff;border-radius:8px;text-decoration:none;font-weight:600;font-size:14px">
      🔗 Abrir arte / mockup
    </a>
    <span style="font-size:11px;margin-top:4px">Abre em nova aba</span>
  </div></div>`;
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function fBRL(v) {
  return 'R$ ' + Number(v || 0).toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.');
}

const STATUS_LABEL = {
  pendente: '⏳ Pendente', aguardando_aprovacao: '🎨 Aguardando Aprovação',
  producao: '🔧 Em Produção', pronto: '✅ Pronto',
  entregue: '📦 Entregue', cancelado: '❌ Cancelado'
};

let pedidoId = null;

async function carregar() {
  const params = new URLSearchParams(location.search);
  pedidoId = params.get('id');
  if (!pedidoId) {
    document.getElementById('conteudo').innerHTML = '<p style="color:#dc3545">Link inválido — nenhum pedido informado.</p>';
    return;
  }
  try {
    const res = await fetch(`${API_BASE}/pedidos/publico/${pedidoId}`);
    if (!res.ok) throw new Error('Pedido não encontrado.');
    const p = await res.json();
    renderPedido(p);
  } catch (e) {
    document.getElementById('conteudo').innerHTML = `<p style="color:#dc3545">${esc(e.message)}</p>`;
  }
}

function renderPedido(p) {
  const jaProcessado = ['producao','pronto','entregue','cancelado'].includes(p.status) && p.status !== 'aguardando_aprovacao';
  const itens = (p.items || []).map(i =>
    `• ${esc(i.desc)} &nbsp;<span style="color:#6c757d;font-size:12px">${i.qty}× ${fBRL(i.unit)}</span>`
  ).join('<br>') || '—';

  // Mockup: resolve URL e decide como mostrar
  const mockupHtml = p.mockupUrl ? resolverMockup(p.mockupUrl)
    : `<div class="mockup-wrap"><div class="mockup-placeholder">
        🖼️ <span>Arte será enviada pelo WhatsApp</span>
        <span style="font-size:11px">(confirme com o atendente)</span>
       </div></div>`;

  const actionHtml = jaProcessado
    ? `<div class="msg" style="display:block;background:#d4edda;color:#155724">Este pedido já foi processado (${STATUS_LABEL[p.status] || p.status}).</div>`
    : `<div class="btns" id="btns">
        <button class="btn-ok" onclick="aprovar()">✅ Aprovar Arte</button>
        <button class="btn-alt" onclick="abrirRejeicao()">✏️ Solicitar Alteração</button>
      </div>
      <div class="reject-box" id="reject-box">
        <label>O que precisa ser alterado no projeto?</label>
        <textarea id="reject-txt" placeholder="Descreva o que deve ser corrigido…"></textarea>
        <button class="reject-send" onclick="enviarRejeicao()">Enviar solicitação</button>
      </div>
      <div id="msg" class="msg"></div>`;

  document.getElementById('conteudo').innerHTML = `
    ${p.num ? `<div class="ped-num">#${p.num}</div>` : ''}
    <h2>${esc(p.clienteNome)}</h2>
    <div class="sub">${p.criadoEm ? new Date(p.criadoEm).toLocaleDateString('pt-BR') : ''}${p.prazoEntrega ? ' &nbsp;|&nbsp; Prazo: ' + esc(p.prazoEntrega) : ''}</div>
    <div class="info">
      <strong>Status:</strong> ${STATUS_LABEL[p.status] || p.status}<br>
      <strong>Itens:</strong><br>${itens}<br>
      <strong>Total:</strong> ${fBRL(p.total)}
      ${p.obs ? '<br><strong>Observação:</strong> ' + esc(p.obs) : ''}
    </div>
    ${mockupHtml}
    ${actionHtml}
  `;
}

function abrirRejeicao() {
  document.getElementById('reject-box').style.display = 'block';
  document.getElementById('reject-txt').focus();
  document.querySelectorAll('#btns button').forEach(b => b.disabled = true);
}

async function aprovar() {
  document.querySelectorAll('#btns button').forEach(b => b.disabled = true);
  try {
    const res = await fetch(`${API_BASE}/pedidos/publico/${pedidoId}/aprovar`, { method: 'POST' });
    if (!res.ok) throw new Error('Erro ao processar.');
    document.getElementById('btns').style.display = 'none';
    const msg = document.getElementById('msg');
    msg.style.display = 'block'; msg.style.background = '#d4edda'; msg.style.color = '#155724';
    msg.innerHTML = '✅ <strong>Arte aprovada!</strong><br>Seu pedido entrou em produção. Obrigado pela confiança!';
  } catch (e) {
    alert('Erro: ' + e.message);
    document.querySelectorAll('#btns button').forEach(b => b.disabled = false);
  }
}

async function enviarRejeicao() {
  const txt = (document.getElementById('reject-txt').value || '').trim();
  if (!txt) { document.getElementById('reject-txt').style.borderColor = '#dc3545'; document.getElementById('reject-txt').focus(); return; }
  document.querySelectorAll('.reject-box button').forEach(b => b.disabled = true);
  try {
    const res = await fetch(`${API_BASE}/pedidos/publico/${pedidoId}/alteracao`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ feedback: txt })
    });
    if (!res.ok) throw new Error('Erro ao processar.');
    document.getElementById('btns').style.display = 'none';
    document.getElementById('reject-box').style.display = 'none';
    const msg = document.getElementById('msg');
    msg.style.display = 'block'; msg.style.background = '#f8d7da'; msg.style.color = '#721c24';
    msg.innerHTML = '✏️ <strong>Alteração solicitada!</strong><br>Nossa equipe receberá sua mensagem e entrará em contato em breve.';
  } catch (e) {
    alert('Erro: ' + e.message);
    document.querySelectorAll('.reject-box button').forEach(b => b.disabled = false);
  }
}

carregar();
</script>
</body>
</html>
